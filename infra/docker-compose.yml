name: codeintel

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codeintel
      POSTGRES_PASSWORD: codeintel
      POSTGRES_DB: codeintel
    ports: ["5432:5432"]
    volumes: [pg:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "codeintel"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://codeintel:codeintel@postgres:5432/codeintel
      REDIS_URL: redis://redis:6379/0
      CODEINTEL_PROVIDER: ${CODEINTEL_PROVIDER:-mock}
      CODEINTEL_SANDBOX: docker
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    # The API needs the docker socket to launch sandbox containers. In
    # production we replace this with a Kubernetes Job-based sandbox.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dashboard:
    build:
      context: ../apps/dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pg:
