apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeintel-api
  labels:
    app: codeintel
    component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels: { app: codeintel, component: api }
  template:
    metadata:
      labels: { app: codeintel, component: api }
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 8000 }]
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: codeintel-secrets, key: database_url } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: codeintel-secrets, key: redis_url } }
            - name: CODEINTEL_PROVIDER
              value: {{ .Values.provider.default | quote }}
            - name: CODEINTEL_SANDBOX
              value: docker
            - name: CLERK_JWKS_URL
              value: {{ .Values.auth.clerk.jwksUrl | quote }}
            - name: CLERK_AUDIENCE
              value: {{ .Values.auth.clerk.audience | quote }}
          readinessProbe: { httpGet: { path: /readyz, port: 8000 } }
          livenessProbe:  { httpGet: { path: /healthz, port: 8000 } }
          resources:
            requests:
              cpu: {{ .Values.resources.api.requests.cpu }}
              memory: {{ .Values.resources.api.requests.memory }}
            limits:
              cpu: {{ .Values.resources.api.limits.cpu }}
              memory: {{ .Values.resources.api.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: codeintel-api
spec:
  selector: { app: codeintel, component: api }
  ports: [{ port: 80, targetPort: 8000 }]
