apiVersion: v1
kind: Secret
metadata:
  name: codeintel-secrets
type: Opaque
stringData:
  database_url: {{ .Values.postgres.url | default "postgresql+psycopg://codeintel:codeintel@codeintel-postgres:5432/codeintel" | quote }}
  redis_url:    {{ .Values.redis.url    | default "redis://codeintel-redis:6379/0" | quote }}
