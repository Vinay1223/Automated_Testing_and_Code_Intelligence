[project]
name = "codeintel-engine"
version = "0.1.0"
description = "CodeIntel engine: profilers, generators, providers, sandbox, orchestrator."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9.0",
    "pydantic-ai>=1.97.0",
    "anyio>=4.4.0",
    "httpx>=0.27.0",
    "groq>=1.2.0",
    "PyGithub>=2.6.0",
    "python-dotenv>=1.1.0",
    "tree-sitter>=0.23.0",
    "tree-sitter-language-pack>=0.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["codeintel_engine"]
